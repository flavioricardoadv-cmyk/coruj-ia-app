name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        run: ruff check app/ --select E9,F --ignore F401 --exclude app/motor/exemplo

      - name: Check imports resolve
        run: python -c "from app.main import app; print('OK')"
        env:
          DATABASE_URL: "sqlite:///./ci_test.db"
          ANTHROPIC_API_KEY: "sk-dummy-key-for-ci"
